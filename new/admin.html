<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Painel Administrativo - SINPROESEMMA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="icon" type="image/png" href="img/logo.png" />
    <link rel="stylesheet" href="styles.css" />
    <style>
        .admin-layout {
            display: grid;
            grid-template-columns: 250px 1fr;
            min-height: 100vh;
        }

        .admin-sidebar {
            background-color: var(--color-primary);
            color: var(--color-white);
            padding: var(--spacing-lg);
            display: flex;
            flex-direction: column;
        }

        .admin-sidebar h2 {
            color: var(--color-white);
            margin-bottom: var(--spacing-xl);
            font-size: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .admin-nav {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-sm);
            flex: 1;
        }

        .admin-nav a {
            color: var(--color-white);
            text-decoration: none;
            padding: 0.75rem 1rem;
            border-radius: var(--radius-md);
            transition: background-color var(--transition-fast);
        }

        .admin-nav a:hover,
        .admin-nav a.active {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .admin-content {
            background-color: var(--color-gray-50);
            padding: var(--spacing-xl);
            overflow-y: auto;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-xl);
            padding-bottom: var(--spacing-md);
            border-bottom: 1px solid var(--color-gray-200);
        }

        /* Forms inside Admin */
        .card-form {
            background: var(--color-white);
            padding: var(--spacing-xl);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            margin-bottom: var(--spacing-xl);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-md);
        }

        .form-group {
            margin-bottom: var(--spacing-md);
        }

        .form-group label {
            display: block;
            margin-bottom: var(--spacing-xs);
            font-weight: 500;
            color: var(--color-gray-800);
        }

        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--color-gray-300);
            border-radius: var(--radius-md);
            font-family: inherit;
            font-size: 1rem;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--color-secondary);
        }

        textarea.form-control {
            resize: vertical;
            min-height: 120px;
        }

        .form-help {
            display: block;
            font-size: 0.875rem;
            color: var(--color-gray-600);
            margin-top: 0.25rem;
        }

        /* News List Table */
        .table-responsive {
            overflow-x: auto;
        }

        .admin-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--color-white);
            box-shadow: var(--shadow-sm);
            border-radius: var(--radius-md);
            overflow: hidden;
        }

        .admin-table th,
        .admin-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--color-gray-200);
        }

        .admin-table th {
            background-color: var(--color-gray-100);
            font-weight: 600;
            color: var(--color-gray-800);
        }

        .admin-table tbody tr:hover {
            background-color: var(--color-gray-50);
        }

        .action-buttons {
            display: flex;
            gap: 0.5rem;
        }

        .btn-delete {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 0.25rem 0.5rem;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.875rem;
        }

        .btn-delete:hover {
            background-color: #c82333;
        }

        @media (max-width: 768px) {
            .admin-layout {
                grid-template-columns: 1fr;
            }

            .admin-sidebar {
                padding: var(--spacing-md);
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }

        #page-loader {
            position: fixed;
            inset: 0;
            background: var(--color-white);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--color-gray-200);
            border-top-color: var(--color-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div id="page-loader">
        <div class="spinner"></div>
        <p>Verificando autenticação...</p>
    </div>

    <div class="admin-layout" style="display: none;" id="admin-container">
        <aside class="admin-sidebar">
            <h2>
                <img src="img/logo.png" alt="Logo" width="30">
                Admin Painel
            </h2>
            <nav class="admin-nav">
                <a href="#" class="active">Gerenciar Notícias</a>
                <a href="index.html" target="_blank">Ver Site</a>
            </nav>
            <div style="margin-top: auto;">
                <button id="logout-btn" class="btn btn-secondary btn-small" style="width: 100%;">Sair da conta</button>
            </div>
        </aside>

        <main class="admin-content">
            <header class="admin-header">
                <h1>Notícias do Núcleo</h1>
                <p id="user-info" style="color: var(--color-gray-600);"></p>
            </header>

            <section class="card-form">
                <h2 style="margin-bottom: 1rem;">Publicar Nova Notícia</h2>
                <form id="news-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="news-title">Título da Notícia *</label>
                            <input type="text" id="news-title" class="form-control" required
                                placeholder="Ex: Assembleia Geral Extraordinária">
                        </div>
                        <div class="form-group">
                            <label for="news-date">Data *</label>
                            <input type="date" id="news-date" class="form-control" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="news-summary">Resumo Curto *</label>
                        <textarea id="news-summary" class="form-control" rows="2" required
                            placeholder="Texto chamativo que aparece no card da notícia..."></textarea>
                        <span class="form-help">Máximo sugerido: 150 caracteres.</span>
                    </div>

                    <div class="form-group">
                        <label for="news-content">Conteúdo Completo</label>
                        <textarea id="news-content" class="form-control" rows="6"
                            placeholder="Escreva o texto completo da notícia aqui... (Suporta estruturação em parágrafos)"></textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="news-image-method">Tipo de Imagem *</label>
                            <select id="news-image-method" class="form-control">
                                <option value="upload">Fazer Upload de Arquivo (Recomendado)</option>
                                <option value="url">Colar Link (URL) da Imagem</option>
                                <option value="none">Sem Imagem</option>
                            </select>
                        </div>

                        <div class="form-group" id="image-upload-group">
                            <label for="news-image-file">Selecionar Imagem</label>
                            <input type="file" id="news-image-file" class="form-control"
                                accept="image/png, image/jpeg, image/webp">
                        </div>

                        <div class="form-group" id="image-url-group" style="display: none;">
                            <label for="news-image-url">Link da Imagem</label>
                            <input type="url" id="news-image-url" class="form-control"
                                placeholder="https://exemplo.com/imagem.png">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="news-source-link">Link Fonte (Opcional)</label>
                        <input type="url" id="news-source-link" class="form-control"
                            placeholder="Link externo se a notícia for de outro site">
                    </div>

                    <div style="display: flex; gap: 1rem; align-items: center;">
                        <button type="submit" class="btn btn-primary" id="submit-news-btn">Publicar Notícia</button>
                        <span id="form-status" style="font-weight: 500;"></span>
                    </div>
                </form>
            </section>

            <section>
                <h2 style="margin-bottom: 1rem;">Notícias Publicadas</h2>
                <div class="table-responsive">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Data</th>
                                <th>Título</th>
                                <th>Imagem</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="admin-news-list">
                            <tr>
                                <td colspan="4" style="text-align: center;">Carregando notícias...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="admin.js"></script>
</body>

</html>
