<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Login - SINPROESEMMA Núcleo Alto Alegre do Pindaré/MA." />
    <meta name="robots" content="noindex, nofollow" />
    <title>SINPROESEMMA | Login Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="icon" type="image/png" href="../img/logo.png" />
    <link rel="stylesheet" href="../css/styles.css" />
    <style>
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
            padding: var(--spacing-md);
        }

        .login-card {
            background-color: var(--color-white);
            padding: var(--spacing-xl);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-card h1 {
            color: var(--color-primary);
            margin-bottom: var(--spacing-sm);
            font-size: 1.5rem;
        }

        .login-card p {
            margin-bottom: var(--spacing-lg);
            color: var(--color-gray-600);
        }

        .form-group {
            margin-bottom: var(--spacing-md);
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: var(--spacing-xs);
            font-weight: 500;
            color: var(--color-gray-800);
        }

        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--color-gray-300);
            border-radius: var(--radius-md);
            font-family: inherit;
            font-size: 1rem;
            transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--color-secondary);
            box-shadow: 0 0 0 3px rgba(255, 184, 0, 0.2);
        }

        .login-btn {
            width: 100%;
            margin-top: var(--spacing-sm);
        }

        .error-message {
            color: #dc3545;
            font-size: 0.875rem;
            margin-top: var(--spacing-sm);
            min-height: 1.2rem;
            display: none;
        }

        .error-message.active {
            display: block;
        }
    </style>
</head>

<body class="bg-gray-50">

    <main>
        <section class="login-container">
            <div class="login-card">
                <img src="../img/logo.png" alt="Logo SINPROESEMMA" width="80" style="margin-bottom: 1rem;">
                <h1>Acesso Restrito</h1>
                <p>Faça login para gerenciar as notícias do site.</p>

                <form id="login-form">
                    <div class="form-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" class="form-control" placeholder="Seu e-mail de administrador"
                            required autocomplete="email">
                    </div>
                    <div class="form-group">
                        <label for="password">Senha</label>
                        <input type="password" id="password" class="form-control" placeholder="Sua senha" required
                            autocomplete="current-password">
                    </div>
                    <div id="login-error" class="error-message"></div>
                    <button type="submit" class="btn btn-primary login-btn" id="login-submit-btn">Entrar no
                        painel</button>
                </form>
                <div style="margin-top: 2rem;">
                    <a href="../index.html" class="btn btn-outline btn-small" style="width: 100%;">Voltar para a Home</a>
                </div>
            </div>
        </section>
    </main>

    <script type="module" src="../js/login.js"></script>
</body>

</html>
